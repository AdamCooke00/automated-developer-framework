name: Template Sync

on:
  schedule:
    - cron: "0 0 1 * *" # 1st of every month
  workflow_dispatch: # Manual trigger from Actions tab

jobs:
  template-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Sync from template
        uses: AndreasAugustin/actions-template-sync@v2
        with:
          # TODO: Update this to your template repo (e.g., your-username/automated-developer-framework)
          source_repo_path: <owner>/automated-developer-framework
          upstream_branch: main
          pr_labels: template_sync
          pr_title: "chore: sync updates from template repository"

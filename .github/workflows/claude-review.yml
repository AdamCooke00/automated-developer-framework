name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    env:
      HAS_MAX_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN != '' && 'true' || 'false' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      # Primary: Use Max subscription (no additional cost)
      - name: Review with Max subscription
        id: max
        if: env.HAS_MAX_TOKEN == 'true'
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          allowed_bots: "claude"
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Review this pull request. Use `gh pr diff` to read the changes,
            then post your review using `gh pr review` with the --comment flag
            and a markdown body. Focus on bugs, convention violations, and
            missing tests. One sentence per issue with the fix. Skip praise.

            Format your review body as follows:
            - If you find actionable bugs or issues: start the body with "## Issues Found" as the first line, then list each issue.
            - If the code looks clean: start the body with "## No Issues" as the first line, followed by a brief confirmation.
          claude_args: "--max-turns 5 --dangerously-skip-permissions"

      # Check if fallback is actually needed (avoid double-charging on max-turns)
      - name: Check if fallback needed
        id: check_fallback
        if: steps.max.outcome != 'success'
        run: |
          OUTPUT="/home/runner/work/_temp/claude-execution-output.json"
          if [ -f "$OUTPUT" ] && grep -q "error_max_turns" "$OUTPUT" 2>/dev/null; then
            echo "Max hit turn limit after doing work — skipping fallback"
            echo "needed=false" >> $GITHUB_OUTPUT
          else
            echo "needed=true" >> $GITHUB_OUTPUT
          fi

      # Fallback: Use API key (pay-per-token) — only on auth failures, not max-turns
      - name: Fallback to API key
        id: fallback
        if: steps.max.outcome != 'success' && steps.check_fallback.outputs.needed != 'false'
        uses: anthropics/claude-code-action@v1
        with:
          allowed_bots: "claude"
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Review this pull request. Use `gh pr diff` to read the changes,
            then post your review using `gh pr review` with the --comment flag
            and a markdown body. Focus on bugs, convention violations, and
            missing tests. One sentence per issue with the fix. Skip praise.

            Format your review body as follows:
            - If you find actionable bugs or issues: start the body with "## Issues Found" as the first line, then list each issue.
            - If the code looks clean: start the body with "## No Issues" as the first line, followed by a brief confirmation.
          claude_args: "--max-turns 5 --dangerously-skip-permissions"

      # Request fixes for review findings (runs after both max and fallback)
      - name: Request fixes for review findings
        if: always()
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # Count existing review-fix-cycle markers to prevent infinite loops
          MARKER_COUNT=$(gh pr view "$PR_NUMBER" --json comments --jq '[.comments[].body | select(contains("<!-- review-fix-cycle -->"))] | length')
          echo "Found $MARKER_COUNT existing fix-cycle markers"

          if [ "$MARKER_COUNT" -ge 2 ]; then
            echo "Loop limit reached (>= 2 cycles). Skipping auto-fix request."
            exit 0
          fi

          # Fetch the most recent review body
          REVIEW_BODY=$(gh api "repos/${{ github.repository }}/pulls/$PR_NUMBER/reviews" \
            --jq '[.[] | select(.state == "COMMENTED")] | sort_by(.submitted_at) | last | .body')

          if [ -z "$REVIEW_BODY" ]; then
            echo "No review found. Skipping auto-fix request."
            exit 0
          fi

          # Check if the first line contains "Issues Found" (case-insensitive)
          FIRST_LINE=$(echo "$REVIEW_BODY" | head -n1)
          if echo "$FIRST_LINE" | grep -iq "## Issues Found"; then
            echo "Review found issues. Posting fix request comment..."
            gh pr comment "$PR_NUMBER" --body "<!-- review-fix-cycle -->
          @claude The automated code review found issues that need fixing. Read the review comments above, fix the identified bugs and issues, commit, and push."
            echo "Fix request posted successfully."
          else
            echo "No issues found in review. Skipping auto-fix request."
          fi
